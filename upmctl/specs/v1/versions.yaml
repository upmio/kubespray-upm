spec_version: 1.0.0
api_version: upmctl.upm.io/v1alpha1
product_status: development

go:
  module: github.com/upmio/kubespray-upm/upmctl
  minimum: "1.24"

platform:
  host_os:
    - rocky-linux-9
    - rhel-9
  architecture:
    - x86_64
  provider: libvirt
  vm_orchestrator: vagrant
  kubernetes_orchestrator: kubespray
  runtime: containerd

cluster:
  min_nodes: 3
  default_nodes: 5
  max_nodes: 8
  control_plane: k8s-1
  etcd: k8s-1
  upm_service_node: k8s-2
  service_cidr: 10.233.0.0/18
  pod_cidr: 10.233.64.0/18

network:
  nat_cidr: 192.168.200.0/24
  nat_gateway: 192.168.200.1
  nat_reserved_dhcp: 192.168.200.2-192.168.200.100

version_policy:
  kubernetes: 1.36.1
  guest_box: product-matrix-pinned
  charts: product-matrix-pinned
  note: Exact deployable versions must be read from the implementation release manifest, not duplicated in Skill prompts.
